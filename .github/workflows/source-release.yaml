name: Create Source Code Release

on:
  workflow_dispatch:

jobs:
  build-source:
    runs-on: ubuntu-latest
    container:
      image: codeberg.org/librewolf/bsys6:dind
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get -y install --no-install-recommends pigz gnupg python3 gh

      - name: Make LibreWolf source archive
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          make all

      - name: Check patches
        run: |
          make check-fuzz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librewolf-source
          path: |
            librewolf-*.source.tar.gz
            librewolf-*.source.tar.gz.sha256sum
            librewolf-*.source.tar.gz.sha512sum
            librewolf-*.source.tar.gz.sig
            patchfail-fuzz.out
          retention-days: 7

  publish-release:
    runs-on: ubuntu-latest
    container:
      image: codeberg.org/librewolf/bsys6:dind
    needs: [build-source]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Set variables
        id: version
        run: |
          echo "VERSION=$(cat version)" >> $GITHUB_OUTPUT
          echo "RELEASE=$(cat release)" >> $GITHUB_OUTPUT
          echo "BUILD_JOB_ID=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT

      - name: Create Release
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.VERSION }}-${{ steps.version.outputs.RELEASE }}"

          FILES=(
            "librewolf-${TAG}.source.tar.gz"
            "librewolf-${TAG}.source.tar.gz.sha256sum"
            "librewolf-${TAG}.source.tar.gz.sha512sum"
          )

          if [[ -n "$SIGNING_KEY" ]]; then
            FILES+=("librewolf-${TAG}.source.tar.gz.sig")
          fi

          gh release create "$TAG" \
            --title "LibreWolf Source v${TAG}" \
            --notes "## LibreWolf Source Release v${TAG}\nBuilt on GitHub by workflow [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            "${FILES[@]}"
